[runtime]
database_path = "state/civ6-workflow.sqlite3"
execution_mode = "readonly" # readonly | confirm | auto
auto_end_turn = false
poll_interval_seconds = 1.0
max_agent_calls_per_turn = 1
max_turn_seconds = 300

[civ6_mcp]
command = "civ-mcp"
args = []
# Optional environment overrides passed to the civ-mcp process.
env = {}

[state_api]
# Structured read-only FastAPI service embedded in lmwilki/civ6-mcp.
base_url = "http://127.0.0.1:8000"
timeout_seconds = 10.0
startup_retry_seconds = 5.0

[codex]
# Runtime planning uses the Responses API directly. Set an API model available
# to your OpenAI API project and export OPENAI_API_KEY before connecting.
backend = "responses" # responses | codex_cli
model = ""
api_base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
# Optional JSON file containing the same key name, used when the environment is unset.
api_key_file = ""
reasoning_effort = "low"
timeout_seconds = 120
connect_timeout_seconds = 10.0
read_timeout_seconds = 90.0
write_timeout_seconds = 30.0
pool_timeout_seconds = 10.0
max_http_attempts = 3
retry_base_seconds = 0.5
# Project-local persistent directory for the codex_cli diagnostic fallback.
state_directory = "state/codex-planner"

# The remaining options apply only to the explicit codex_cli diagnostic fallback.
command = "codex"
sandbox = "read-only"
ephemeral = true
ignore_user_config = false
ignore_project_rules = true
disable_external_tools = true
disabled_mcp_servers = ["civ6", "openaiDeveloperDocs", "node_repl"]
config_overrides = []
use_output_schema = true

[gate]
repeated_failure_threshold = 2
default_cooldown_turns = 2

[safety]
# Actions the planner may propose. This is independent of execution mode.
allowed_action_types = [
  "city_set_production",
  "set_research",
  "set_civic",
  "unit_move",
  # Irreversible and intentionally excluded from auto_action_types.
  "unit_found_city",
  "builder_improve",
  "unit_heal",
  "unit_fortify",
  "unit_skip",
]
# Subset allowed to execute without approval, but only when execution_mode="auto".
# In execution_mode="confirm", every newly proposed task waits for approval.
auto_action_types = [
  "city_set_production",
  "set_research",
  "set_civic",
  "unit_move",
  "builder_improve",
  "unit_heal",
  "unit_fortify",
  "unit_skip",
]
# These upstream MCP tools can be reached by the deterministic action registry.
allowed_tools = [
  "set_city_production",
  "set_research",
  "unit_action",
  "end_turn",
]
